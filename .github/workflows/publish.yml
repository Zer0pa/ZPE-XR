name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  build-wheels:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: manylinux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: "2014"
            args: --release --locked --compatibility pypi -i python3.11 --out dist
          - name: manylinux-aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: "2014"
            args: --release --locked --compatibility pypi -i python3.11 --out dist
          - name: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            args: --release --locked --compatibility pypi --out dist
          - name: macos-x86_64
            os: macos-13
            target: x86_64-apple-darwin
            args: --release --locked --compatibility pypi --out dist
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            args: --release --locked --compatibility pypi --out dist
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || '' }}
          args: ${{ matrix.args }}
          maturin-version: v1.11.5
          sccache: true

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.name }}
          path: dist

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          maturin-version: v1.11.5
          sccache: true

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs:
      - build-wheels
      - build-sdist
    environment:
      name: pypi
      url: https://pypi.org/p/zpe-xr
    permissions:
      id-token: write
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
