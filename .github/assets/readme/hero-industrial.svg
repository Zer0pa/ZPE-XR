<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 520" role="img" aria-labelledby="title desc">
  <title id="title">ZPE-IMC Industrial Hero</title>
  <desc id="desc">Monochrome grid hero for the ZPE-IMC repository README.</desc>
  <defs>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#2f2f2f" stroke-width="1"/>
    </pattern>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="520" fill="#0b0b0b"/>
  <rect width="1600" height="520" fill="url(#grid)"/>

  <rect x="70" y="86" width="1460" height="348" fill="none" stroke="#ffffff" stroke-opacity="0.28" stroke-width="2"/>
  <rect x="96" y="112" width="1410" height="296" fill="none" stroke="#ffffff" stroke-opacity="0.16" stroke-width="1"/>
  <rect x="96" y="364" width="1410" height="44" fill="url(#fade)"/>

  <text x="130" y="216" fill="#ffffff" font-family="Oswald, Arial, Helvetica, sans-serif" font-size="116" font-weight="500" letter-spacing="3">ZPE-IMC</text>
  <text x="136" y="270" fill="#f1f1f1" font-family="Oswald, Arial, Helvetica, sans-serif" font-size="30" font-weight="300" letter-spacing="1.5">INTEGRATION MULTIMODAL CODEC</text>

  <line x1="130" y1="298" x2="1180" y2="298" stroke="#ffffff" stroke-opacity="0.4" stroke-width="2"/>

  <text x="130" y="340" fill="#d9d9d9" font-family="Oswald, Arial, Helvetica, sans-serif" font-size="24" font-weight="300" letter-spacing="0.8">WAVE-1 CONTRACT: FROZEN</text>
  <text x="560" y="340" fill="#d9d9d9" font-family="Oswald, Arial, Helvetica, sans-serif" font-size="24" font-weight="300" letter-spacing="0.8">LANES: 8/8 PASS</text>
  <text x="860" y="340" fill="#d9d9d9" font-family="Oswald, Arial, Helvetica, sans-serif" font-size="24" font-weight="300" letter-spacing="0.8">CANONICAL: total_words=844</text>

  <text x="130" y="392" fill="#bbbbbb" font-family="Oswald, Arial, Helvetica, sans-serif" font-size="18" font-weight="300" letter-spacing="0.7">github.com/zer0pa/zpe-imc</text>
  <text x="1326" y="392" fill="#bbbbbb" font-family="Oswald, Arial, Helvetica, sans-serif" font-size="18" font-weight="300" text-anchor="end" letter-spacing="0.7">architects@zer0pa.ai</text>
</svg>
